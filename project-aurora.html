<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 01 Detail</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="project-detail detail-template" data-project-slot="project1">
    <div class="detail-shell">
      <header class="detail-hero detail-hero-dynamic">
        <a class="back-link" href="./index.html">← 메인으로</a>
        <div class="detail-hero-copy">
          <p class="eyebrow" data-detail-field="project">Project 01</p>
          <h1 data-detail-field="title">Project Title</h1>
          <p class="lede" data-detail-field="intro">
            프로젝트 소개 문장이 이 자리에 들어옵니다.
          </p>
        </div>
        <div class="hero-panel detail-meta-panel">
          <div class="detail-meta-group">
            <p class="detail-meta-label">프로젝트 기간</p>
            <p class="detail-meta-value" data-detail-field="date">03/29/2026</p>
          </div>
          <div class="tag-row detail-tag-row" data-detail-field="tags"></div>
        </div>
      </header>

      <main class="detail-content detail-sequence">
        <section class="detail-block detail-block-hero" data-detail-section="1">
          <div class="story-image detail-image-panel" data-detail-image></div>
          <div class="story-copy detail-copy-card">
            <p class="eyebrow">Section 01</p>
            <p class="detail-body detail-body-large" data-detail-body></p>
          </div>
        </section>

        <section class="detail-block detail-block-split" data-detail-section="2">
          <div class="story-copy detail-copy-card">
            <p class="eyebrow">Section 02</p>
            <p class="detail-body" data-detail-body></p>
          </div>
          <div class="story-image detail-image-panel" data-detail-image></div>
        </section>

        <section class="detail-block detail-block-feature" data-detail-section="3">
          <div class="story-image detail-image-panel" data-detail-image></div>
          <div class="story-copy detail-copy-card detail-copy-card-narrow">
            <p class="eyebrow">Section 03</p>
            <p class="detail-body" data-detail-body></p>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
